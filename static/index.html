<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Virtual Try-On</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ─── Top Status Bar ─── -->
    <header class="top-bar">
        <div class="top-bar__left">
            <div class="live-indicator" id="liveIndicator">
                <span class="live-dot"></span>
                <span class="live-text">LIVE</span>
            </div>
        </div>
        <div class="top-bar__right">
            <div class="obs-connect-group">
                <input type="password" id="obsPassword" class="obs-password-input" placeholder="OBS WebSocket密码" title="OBS WebSocket密码" value="a123456789">
                <button class="btn btn--small btn--primary" id="btnConnectOBS" title="Connect to OBS">
                    <i class="fas fa-link"></i> 连接
                </button>
            </div>
            <button class="btn btn--small btn--danger" id="btnDisconnectOBS" title="Disconnect from OBS" style="display:none;">
                <i class="fas fa-unlink"></i> 断开
            </button>
        </div>
    </header>

    <!-- ─── Main Layout ─── -->
    <main class="main-layout">
        <!-- ═══ Left Panel: Image Gallery ═══ -->
        <aside class="panel panel--left">
            <div class="panel__header">
                <h3 class="panel__title">
                    <i class="fas fa-images"></i> 服装图库
                </h3>
                <button class="btn btn--tiny btn--outline" id="btnRefreshImages" title="刷新图片">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="btn btn--tiny btn--primary" id="btnAddLocal" title="添加本地图片">
                    <i class="fas fa-plus"></i> 本地
                </button>
                <input type="file" id="localFileInput" accept="image/*" style="display:none;" multiple>
            </div>

            <!-- Image Grid -->
            <div class="image-grid" id="imageGrid">
                <!-- Images will be loaded dynamically -->
            </div>
        </aside>

        <!-- ═══ Center Panel: OBS Live Preview ═══ -->
        <section class="panel panel--center">
            <!-- Main Preview Area -->
            <div class="main-preview">
                <div class="main-preview__video" id="mainPreview">
                    <!-- OBS Stream will be displayed here -->
                    <video id="obsVideo" autoplay muted playsinline></video>
                    <canvas id="obsCanvas" style="display:none;"></canvas>
                    <div class="main-preview__placeholder" id="previewPlaceholder">
                        <i class="fas fa-tv"></i>
                        <p>OBS直播画面将显示在这里</p>
                        <p class="small">请连接OBS</p>
                    </div>
                    <div class="ai-generated-badge" id="aiBadge" style="display:none;">
                        AI 生成
                    </div>
                    <!-- Generated Image Overlay -->
                    <img id="generatedOverlay" class="generated-overlay" style="display:none;" alt="Generated">
                </div>

                <!-- Bottom Controls -->
                <div class="bottom-controls">
                    <div class="bottom-preview">
                        <div class="bottom-preview__video">
                            <img id="bottomPreviewImg" src="" alt="原始画面" style="display:none;">
                            <div class="bottom-preview__placeholder">
                                <i class="fas fa-image"></i>
                                <span>原始直播画面</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn--tiny btn--outline" id="btnVolume">
                        <i class="fas fa-volume-up"></i> 音量
                    </button>
                </div>
            </div>
        </section>

        <!-- ═══ Right Panel: OBS 虚拟摄像头 Controls ═══ -->
        <aside class="panel panel--right">
            <div class="panel__header">
                <h3 class="panel__title">
                    <i class="fas fa-camera"></i> OBS 虚拟摄像头
                </h3>
            </div>

            <!-- Step Navigation -->
            <div class="step-nav">
                <div class="step completed" data-step="1">
                    <span class="step__number">1</span>
                    <span class="step__label">上传服装</span>
                </div>
                <div class="step__arrow">→</div>
                <div class="step active" data-step="2">
                    <span class="step__number">2</span>
                    <span class="step__label">AI 换装</span>
                </div>
            </div>

            <!-- Mode Selection -->
            <div class="mode-section">
                <label class="mode-label">换装模式</label>
                <div class="mode-options">
                    <button class="mode-btn active" data-mode="tryon" style="flex: 1;">
                        <i class="fas fa-tshirt"></i>
                        <span>AI 服装换装</span>
                    </button>
                </div>
            </div>

            <!-- Clothing Drag & Drop Area -->
            <div class="clothing-section">
                <label class="mode-label">
                    <i class="fas fa-tshirt"></i> 服の图片
                    <small>上传要穿的衣服</small>
                </label>
                <div class="drag-drop-area" id="clothingDropArea">
                    <div class="drag-drop-area__content" id="clothingDropContent">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>服の图片をここにドラッグ&ドロップ</p>
                        <p class="small">或点击选择</p>
                        <input type="file" id="clothingFileInput" accept="image/*" style="display:none;">
                    </div>
                    <div class="drag-drop-area__preview" id="clothingPreview" style="display:none;">
                        <img id="clothingPreviewImg" src="" alt="Clothing">
                        <button class="btn btn--tiny btn--danger" id="btnClearClothing" title="图片をクリア">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Prompt Input -->
            <div class="prompt-section">
                <label class="mode-label">
                    <i class="fas fa-comment-dots"></i> 提示词
                    <small>可选：描述想要的效果</small>
                </label>
                <textarea id="promptInput" class="prompt-textarea" placeholder="描述想要的效果...">beautiful realistic woman, detailed skin texture, lighting, high detail</textarea>
                <div class="prompt-tags">
                    <button class="prompt-tag" data-prompt="可爱少女">可爱少女</button>
                    <button class="prompt-tag" data-prompt="清纯">清纯</button>
                    <button class="prompt-tag" data-prompt="偶像">偶像</button>
                    <button class="prompt-tag" data-prompt="Vtuber">Vtuber</button>
                    <button class="prompt-tag" data-prompt="写实美女">写实美女</button>
                    <button class="prompt-tag" data-prompt="清纯">清纯</button>
                    <button class="prompt-tag" data-prompt="写真">写真</button>
                </div>
                <p class="prompt-note">图片确定外观，提示词稳定姿势。</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-section">
                <button class="btn btn--primary btn--large" id="btnStart" disabled>
                    <i class="fas fa-play"></i> 开始换装
                </button>
                <div class="action-secondary">
                    <button class="btn btn--danger btn--small" id="btnStop" style="display:none;">
                        <i class="fas fa-stop"></i> 停止
                    </button>
                    <button class="btn btn--outline btn--small" id="btnVolume">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <!-- ─── Notification Toast ─── -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ─── Loading Overlay ─── -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>AI生成中...</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
